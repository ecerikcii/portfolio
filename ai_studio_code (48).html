<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immersive Tactile Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Permanent+Marker&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --desk-wood: #2d241f;
            --desk-light: #d2b48c;
            --accent: #a63d40;
            --paper: #fdfaf0;
            --gb-body: #948ba8;
            --gb-screen: #8bac0f;
            --trans: cubic-bezier(0.4, 0, 0.2, 1);
            --bouncy: cubic-bezier(0.68, -0.6, 0.32, 1.6);
            --snap: cubic-bezier(0.2, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; outline: none; }

        body, html {
            height: 100%; width: 100%;
            overflow: hidden;
            background-color: var(--desk-wood);
        }

        /* --- THE DESK --- */
        #desk-viewport {
            position: relative;
            width: 100vw; height: 100vh;
            background-color: var(--desk-light);
            background-image: 
                radial-gradient(circle at center, transparent, rgba(0,0,0,0.1)),
                url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            background-size: cover;
            display: flex; align-items: center; justify-content: center;
            perspective: 1500px;
        }

        /* --- UNIFIED TACTILE HOVER --- */
        .desk-item {
            position: absolute;
            cursor: pointer;
            z-index: 10;
            transition: transform 0.4s var(--bouncy), box-shadow 0.4s ease;
        }
        .desk-item:hover { z-index: 100; }

        /* --- 1. SKETCHBOOK --- */
        #sk-trigger {
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 480px; height: 620px;
            background: #5c2a33; border-radius: 8px 25px 25px 8px;
            border-left: 35px solid #4a1f26;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        #sk-trigger:hover {
            transform: translate(-50%, calc(-50% - 15px)) scale(1.05);
            box-shadow: 0 40px 70px rgba(0,0,0,0.4);
        }

        /* --- 2. GAMEBOY (DESK VERSION) --- */
        #gb-trigger {
            top: 52%; left: 72%;
            width: 400px; height: 240px;
            background: var(--gb-body); border-radius: 18px;
            border-bottom: 10px solid #6c647c; padding: 25px;
            display: flex; gap: 20px; transform: rotate(5deg);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        #gb-trigger:hover {
            transform: rotate(5deg) translateY(-15px) scale(1.06);
            box-shadow: 0 40px 60px rgba(0,0,0,0.3);
        }
        .gb-desk-screen { flex: 2.5; background: #2d3322; border-radius: 6px; border: 8px solid #333; }
        .gb-desk-controls { flex: 1; display: flex; flex-direction: column; justify-content: space-between; align-items: center; }
        .gb-desk-dpad { width: 60px; height: 60px; background: #333; clip-path: polygon(35% 0, 65% 0, 65% 35%, 100% 35%, 100% 65%, 65% 65%, 65% 100%, 35% 100%, 35% 65%, 0 65%, 0 35%, 35% 35%); }
        .gb-desk-btn { width: 25px; height: 25px; background: var(--accent); border-radius: 50%; }

        /* --- 3. STORYBOARD STACK (UNTOUCHED) --- */
        #sb-trigger { top: 6%; left: 7%; width: 440px; height: 320px; }
        .sb-paper-static {
            width: 440px; height: 320px; 
            background: white; border: 1px solid #ddd;
            padding: 15px; box-shadow: 2px 2px 10px rgba(0,0,0,0.15);
            position: absolute; 
            transition: transform 0.4s var(--bouncy), box-shadow 0.4s ease;
        }
        #sb-trigger:hover .sb-paper-static {
            transform: translateY(-20px) scale(1.05) rotate(0deg) !important;
            box-shadow: 0 30px 50px rgba(0,0,0,0.2);
        }

        /* --- 4. BUSINESS CARD --- */
        #card-trigger {
            bottom: 10%; left: 18%;
            width: 240px; height: 140px;
            background: #fff; border-radius: 4px; padding: 25px;
            box-shadow: 2px 5px 15px rgba(0,0,0,0.15);
            transform: rotate(-8deg);
            display: flex; flex-direction: column; justify-content: center;
            transform-style: preserve-3d;
        }
        #card-trigger:hover {
            transform: rotate(-12deg) translateY(-20px) scale(1.1) rotateY(10deg);
            box-shadow: 0 45px 80px rgba(0,0,0,0.3);
        }

        /* --- OVERLAY ENGINE --- */
        .overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(8px);
            z-index: 1000; display: none;
            opacity: 0; transition: opacity 0.3s ease;
        }
        .overlay.active { display: block; opacity: 1; }
        .popup-panel { position: relative; width: 100%; height: 100%; }
        .close-hint { position: fixed; top: 40px; right: 40px; color: white; cursor: pointer; font-size: 16px; font-weight: bold; background: rgba(0,0,0,0.6); padding: 12px 30px; border-radius: 40px; z-index: 999999; }

        /* --- STACK POPUP (UNTOUCHED) --- */
        .stack-paper { 
            background: white; width: 640px; height: 480px;
            padding: 30px; border: 1px solid #ddd; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.2); 
            cursor: grab; position: absolute; 
            transition: transform 0.6s var(--bouncy), top 0.6s var(--bouncy), left 0.6s var(--bouncy);
            display: flex; flex-direction: column;
            pointer-events: auto;
        }
        .stack-paper.is-dragging { transition: none !important; }

        /* --- SKETCHBOOK OVERLAY --- */
        .sk-wrapper { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .sk-unit { 
            width: 1200px; height: 650px; 
            display: flex; align-items: center; 
            transform: scale(1.25); transition: transform 0.5s var(--trans);
            position: relative;
        }
        .book-tabs-left { display: flex; flex-direction: column; gap: 12px; margin-right: -15px; z-index: 5; }
        .book-tab { width: 65px; height: 120px; writing-mode: vertical-rl; text-orientation: mixed; font-size: 13px; font-weight: bold; color: white; border-radius: 12px 0 0 12px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s var(--snap); box-shadow: -5px 5px 15px rgba(0,0,0,0.15); position: relative; }
        .book-tab:hover { transform: translateX(-15px) translateY(-3px) scale(1.05); box-shadow: -12px 12px 30px rgba(0,0,0,0.3); filter: brightness(1.1); z-index: 6; }
        .book-tab:active { transform: translateX(5px) scale(0.96); transition: transform 0.1s var(--trans); }
        .tab-red { background: #e74c3c; } .tab-blue { background: #3498db; } .tab-yellow { background: #f1c40f; } .tab-green { background: #2ecc71; }
        .book-spread { flex: 1; height: 100%; background: var(--paper); display: flex; box-shadow: 0 60px 150px rgba(0,0,0,0.6); border-radius: 4px 15px 15px 4px; overflow: hidden; z-index: 10; gap: 15px; background: linear-gradient(90deg, #fdfaf0 49%, #e2ded0 50%, #fdfaf0 51%); }
        .book-page { flex: 1; padding: 60px; display: flex; flex-direction: column; justify-content: center; position: relative; cursor: pointer; transition: background 0.3s; }
        .book-page.left { background: linear-gradient(to right, #fdfaf0 92%, #e5e1d5 100%); }
        .book-page.right { background: linear-gradient(to left, #fdfaf0 92%, #e5e1d5 100%); }
        .book-page:hover { background: #f7f2e8; }
        .page-arrow { position: absolute; top: 50%; transform: translateY(-50%); font-size: 50px; opacity: 0.4; color: var(--accent); font-weight: bold; }

        /* --- 🎮 GAMEBOY (REFINED ERGONOMICS) --- */
        .gb-wrapper { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .gb-unit { 
            width: 1100px; 
            height: 650px; 
            transform: scale(1.1);
        }
        .gb-shell { 
            background: var(--gb-body); width: 100%; height: 100%; 
            display: flex; padding: 60px; gap: 60px; 
            border-radius: 45px; 
            box-shadow: 0 80px 150px rgba(0,0,0,0.7), inset 0 4px 10px rgba(255,255,255,0.2); 
            border-bottom: 25px solid #6c647c;
            position: relative;
        }
        .gb-screen-large { 
            flex: 3; 
            background: var(--gb-screen); 
            border: 25px solid #2d3322; 
            border-radius: 15px; 
            padding: 30px; 
            font-family: 'VT323', monospace; 
            color: #2d3322;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.2);
        }
        
        .gb-side-controls {
            flex: 1.2; display: flex; flex-direction: column; 
            align-items: center; 
            justify-content: flex-end; /* Lowered controls for ergonomics */
            gap: 50px; /* Precise distance between D-pad and AB buttons */
            padding-bottom: 20px;
        }

        /* High Fidelity D-PAD */
        .d-pad-wrapper { 
            position: relative; 
            width: 180px; height: 180px; 
            background: rgba(0,0,0,0.05);
            border-radius: 50%;
        }
        .pad-btn { 
            position: absolute; 
            background: linear-gradient(145deg, #444, #222);
            border: none; 
            width: 60px; height: 60px; 
            cursor: pointer; 
            z-index: 100; 
            border-radius: 6px;
            color: rgba(255,255,255,0.2);
            font-size: 24px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.4), inset 0 2px 4px rgba(255,255,255,0.1);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .pad-btn:active {
            transform: translate(2px, 2px) scale(0.95);
            box-shadow: 1px 1px 4px rgba(0,0,0,0.6);
            background: #111;
        }
        .up { left: 60px; top: 0; }
        .down { left: 60px; bottom: 0; }
        .left { left: 0; top: 60px; }
        .right { right: 0; top: 60px; }
        .pad-center { 
            position: absolute; width: 60px; height: 60px; left: 60px; top: 60px; 
            background: #2a2a2a; z-index: 90; 
            box-shadow: 4px 4px 10px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
        }
        .pad-center::after {
            content: ''; width: 30px; height: 30px; border-radius: 50%;
            background: rgba(0,0,0,0.3); box-shadow: inset 0 2px 5px rgba(255,255,255,0.1);
        }

        /* Tactile A/B Buttons */
        .gb-btn-large { 
            width: 100px; height: 100px; 
            background: linear-gradient(145deg, var(--accent), #822f32);
            border-radius: 50%; border: none; 
            color: white; font-weight: bold; font-size: 28px; 
            cursor: pointer; 
            box-shadow: 6px 12px 20px rgba(0,0,0,0.4), inset 0 4px 10px rgba(255,255,255,0.2); 
            transition: transform 0.1s var(--snap), box-shadow 0.1s var(--snap);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .gb-btn-large:active { 
            transform: translateY(6px) scale(0.96); 
            box-shadow: 2px 4px 8px rgba(0,0,0,0.6), inset 0 2px 5px rgba(0,0,0,0.3); 
        }

        /* --- 3D CARD --- */
        .card-wrapper { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .card-stage { perspective: 2500px; width: 700px; height: 450px; transform: scale(1.15); }
        .card-3d { width: 100%; height: 100%; transform-style: preserve-3d; cursor: grab; position: relative; }
        .card-front, .card-back { position: absolute; inset: 0; backface-visibility: hidden; background: #fff; border-radius: 15px; padding: 60px; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 30px 70px rgba(0,0,0,0.3); }
        .card-back { transform: rotateY(180deg); background: #fafafa; }

        .label-marker { font-family: 'Permanent Marker'; font-size: 1.6rem; color: var(--accent); }
    </style>
</head>
<body>

<div id="desk-viewport">
    <div id="sk-trigger" class="desk-item" onclick="openUI('sk-overlay')">
        <span style="color:#f2e8cf; font-family:'Permanent Marker'; border:4px solid #f2e8cf; padding:12px 30px; font-size:2.2rem; letter-spacing:3px;">PORTFOLIO</span>
    </div>

    <div id="gb-trigger" class="desk-item" onclick="openUI('gb-overlay')">
        <div class="gb-desk-screen"></div>
        <div class="gb-desk-controls">
            <div class="gb-desk-dpad"></div>
            <div style="display:flex; gap:8px"><div class="gb-desk-btn"></div><div class="gb-desk-btn" style="transform:translateY(-8px)"></div></div>
        </div>
    </div>

    <div id="sb-trigger" class="desk-item" onclick="openUI('paper-overlay')">
        <div class="sb-paper-static" style="transform: rotate(-8deg);"></div>
        <div class="sb-paper-static" style="transform: rotate(4deg); left: 20px; top: 10px;"></div>
        <div class="sb-paper-static" style="transform: rotate(10deg); left: 40px; top: 25px;"></div>
        <div class="label-marker" style="position:absolute; top:340px; left:50px;">STORYBOARDS</div>
    </div>

    <div id="card-trigger" class="desk-item" onclick="openUI('card-overlay')">
        <div class="label-marker" style="line-height: 1;">YOUR NAME</div>
        <div style="font-size: 14px; color: #999; margin-top:10px; letter-spacing:1px; font-weight: bold;">LEAD ARTIST & DEV</div>
    </div>
</div>

<!-- OVERLAYS -->
<div id="paper-overlay" class="overlay" onclick="closeAll(event)">
    <div class="close-hint" onclick="closeAll(event)">✕ BACK TO DESK</div>
    <div id="paper-stack-container" style="width:100%; height:100%; position:relative;"></div>
</div>

<div id="sk-overlay" class="overlay" onclick="closeAll(event)">
    <div class="close-hint" onclick="closeAll(event)">✕ BACK</div>
    <div class="sk-wrapper" onclick="closeAll(event)">
        <div class="sk-unit" onclick="event.stopPropagation()">
            <div class="book-tabs-left">
                <button class="book-tab tab-red" onclick="openSection('character')">CHAR</button>
                <button class="book-tab tab-blue" onclick="openSection('environment')">ENV</button>
                <button class="book-tab tab-yellow" onclick="openSection('storyboard')">STORY</button>
                <button class="book-tab tab-green" onclick="openSection('illustration')">ART</button>
            </div>
            <div class="book-spread">
                <div class="book-page left" onclick="prevPage()">
                    <span class="page-arrow" style="left:20px;">←</span>
                    <h2 id="page-l-title" class="label-marker" style="font-size: 2.8rem;"></h2>
                    <div style="flex:1; background:#eee; margin:30px 0; border:1px solid #ddd; display:flex; align-items:center; justify-content:center; color:#ccc; font-size: 1.5rem;" id="page-l-art"></div>
                </div>
                <div class="book-page right" onclick="nextPage()">
                    <span class="page-arrow" style="right:20px;">→</span>
                    <h2 id="page-r-title" class="label-marker" style="font-size: 2.8rem; color: #333;"></h2>
                    <div style="flex:1; background:#f9f9f9; margin:20px 0; border:1px solid #eee; display:flex; align-items:center; justify-content:center; color:#ccc; font-size: 1.5rem;" id="page-r-art"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="gb-overlay" class="overlay" onclick="closeAll(event)">
    <div class="close-hint" onclick="closeAll(event)">✕ POWER OFF</div>
    <div class="gb-wrapper" onclick="closeAll(event)">
        <div class="gb-unit" style="background:transparent;" onclick="event.stopPropagation()">
            <div class="gb-shell">
                <div class="gb-screen-large" id="gb-screen"></div>
                <div class="gb-side-controls">
                    <div class="d-pad-wrapper">
                        <button class="pad-btn up" onclick="gbAction('up')">↑</button>
                        <button class="pad-btn down" onclick="gbAction('down')">↓</button>
                        <button class="pad-btn left" onclick="gbAction('left')">←</button>
                        <button class="pad-btn right" onclick="gbAction('right')">→</button>
                        <div class="pad-center"></div>
                    </div>
                    <div style="display:flex; gap:35px; transform:rotate(-15deg)">
                        <button onclick="gbAction('back')" class="gb-btn-large" style="background: linear-gradient(145deg, #555, #333);">B</button>
                        <button onclick="gbAction('select')" class="gb-btn-large">A</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="card-overlay" class="overlay" onclick="if(!cardInteracting) closeAll(event)">
    <div class="close-hint" onclick="closeAll(event)">✕ BACK</div>
    <div class="card-wrapper" onclick="closeAll(event)">
        <div class="card-stage" onclick="event.stopPropagation()">
            <div class="card-3d" id="card3d">
                <div class="card-front">
                    <h2 class="label-marker" style="font-size:4rem; line-height:1;">Your Name</h2>
                    <p style="color:#666; font-size: 1.8rem; margin-top: 15px;">Lead Game Artist</p>
                    <p style="margin-top:auto; font-size:14px; opacity:0.3; letter-spacing:2px; font-weight: bold;">DRAG TO ROTATE • SCROLL TO ZOOM</p>
                </div>
                <div class="card-back">
                    <h3 class="label-marker" style="font-size: 2.5rem; margin-bottom: 25px;">Contact Info</h3>
                    <p style="font-size:1.5rem;">📧 hello@studio.com</p>
                    <p style="font-size:1.5rem; margin-top: 10px;">🔗 artstation.com/you</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const portfolio = {
        character: Array.from({length: 10}, (_, i) => ({ l: `Character L ${i+1}`, r: `Character R ${i+1}` })),
        environment: Array.from({length: 10}, (_, i) => ({ l: `Environment L ${i+1}`, r: `Environment R ${i+1}` })),
        storyboard: Array.from({length: 10}, (_, i) => ({ l: `Storyboard L ${i+1}`, r: `Storyboard R ${i+1}` })),
        illustration: Array.from({length: 10}, (_, i) => ({ l: `Art L ${i+1}`, r: `Art R ${i+1}` }))
    };

    const projects = [
        { name: "PROJECT_A", items: ["A1", "A2", "A3", "A4", "A5"] },
        { name: "PROJECT_B", items: ["B1", "B2", "B3", "B4", "B5"] },
        { name: "PROJECT_C", items: ["C1", "C2", "C3", "C4", "C5"] }
    ];

    let activeSection = "character", currentPage = 0, gbIdx = 0, gbItem = 0, inGallery = false, highestZ = 10, cardInteracting = false;

    function openUI(id) {
        const el = document.getElementById(id); el.style.display = 'block';
        setTimeout(() => el.classList.add('active'), 10);
        if(id === 'paper-overlay') initPaperStack();
        if(id === 'sk-overlay') renderBook();
        if(id === 'gb-overlay') updateGB();
        if(id === 'card-overlay') resetCardTransform();
    }

    function closeAll(e) {
        if (e) e.stopPropagation();
        if (cardInteracting) return;
        document.querySelectorAll('.overlay').forEach(o => {
            o.classList.remove('active');
            setTimeout(() => o.style.display = 'none', 300);
        });
    }

    function openSection(s) { activeSection = s; currentPage = 0; renderBook(); }
    function renderBook() {
        const sec = portfolio[activeSection], pg = sec[currentPage];
        document.getElementById("page-l-title").innerText = pg.l;
        document.getElementById("page-r-title").innerText = pg.r;
        document.getElementById("page-l-art").innerText = `ASSET_${activeSection.toUpperCase()}_L`;
        document.getElementById("page-r-art").innerText = `ASSET_${activeSection.toUpperCase()}_R`;
    }
    function nextPage() { const s = portfolio[activeSection]; currentPage = (currentPage+1)%s.length; renderBook(); }
    function prevPage() { const s = portfolio[activeSection]; currentPage = (currentPage-1+s.length)%s.length; renderBook(); }

    function updateGB() {
        const s = document.getElementById('gb-screen');
        if (!inGallery) {
            s.innerHTML = `<div style="border-bottom:2px solid #2d3322; padding-bottom:5px;">OS v1.2</div>` + 
            projects.map((p, i) => `<div style="padding:5px; ${i === gbIdx ? 'background:#2d3322; color:#8bac0f' : ''}">${i === gbIdx ? '> ' : '  '}${p.name}</div>`).join('');
        } else {
            const p = projects[gbIdx];
            s.innerHTML = `<div style="border-bottom:2px solid #2d3322">${p.name}</div><div style="margin-top:40px; text-align:center;"><div>${p.items[gbItem]}</div><div style="opacity:0.6; margin-top:10px;">[ ${gbItem+1} / 5 ]</div></div>`;
        }
    }
    function gbAction(btn) {
        if(!inGallery) {
            if(btn === 'up') gbIdx = (gbIdx-1+3)%3; if(btn === 'down') gbIdx = (gbIdx+1)%3;
            if(btn === 'select') { inGallery = true; gbItem = 0; }
        } else {
            if(btn === 'back') inGallery = false;
            if(btn === 'left' || btn === 'up') gbItem = (gbItem-1+5)%5; 
            if(btn === 'right' || btn === 'down') gbItem = (gbItem+1)%5;
        }
        updateGB();
    }

    function initPaperStack() {
        const container = document.getElementById('paper-stack-container');
        container.innerHTML = ""; 
        for (let i = 0; i < 5; i++) {
            const p = document.createElement('div'); p.className = 'stack-paper';
            p.style.left = "50%"; p.style.top = "50%";
            p.style.transform = "translate(-50%, -50%) scale(0.1)"; p.style.zIndex = i;
            p.innerHTML = `<div class="label-marker" style="margin-bottom:20px;">SEQ_0${i+1}</div><div style="flex:1; background:#f5f5f5; border:1px solid #ccc; display:flex; align-items:center; justify-content:center; color:#aaa;">SCENE_CONTENT_0${i+1}</div>`;
            p.onmousedown = (e) => {
                e.stopPropagation(); highestZ++; p.style.zIndex = highestZ;
                p.classList.add('is-dragging');
                const offX = e.clientX - p.offsetLeft; const offY = e.clientY - p.offsetTop;
                const move = (mE) => { p.style.left = (mE.clientX - offX) + 'px'; p.style.top = (mE.clientY - offY) + 'px'; };
                window.addEventListener('mousemove', move);
                window.addEventListener('mouseup', () => { p.classList.remove('is-dragging'); window.removeEventListener('mousemove', move); }, {once:true});
            };
            p.onclick = (e) => e.stopPropagation();
            container.appendChild(p);
            setTimeout(() => {
                const safeX = 10 + Math.random() * 50; const safeY = 5 + Math.random() * 25;
                const randomRot = (Math.random() * 24) - 12;
                p.style.left = safeX + "%"; p.style.top = safeY + "%"; p.style.transform = `rotate(${randomRot}deg) scale(1)`;
            }, 50 + (i * 60));
        }
    }

    const card3d = document.getElementById("card3d");
    let rotX = 0, rotY = 0, scale = 1, isDragging = false, lastX = 0, lastY = 0;
    function resetCardTransform() { rotX = 0; rotY = 0; scale = 1; updateCardTransform(); }
    function updateCardTransform() { card3d.style.transform = `scale(${scale}) rotateX(${rotX}deg) rotateY(${rotY}deg)`; }
    card3d.addEventListener("mousedown", (e) => { isDragging = true; cardInteracting = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener("mousemove", (e) => {
        if (!isDragging || !document.getElementById('card-overlay').classList.contains('active')) return;
        let dx = e.clientX - lastX, dy = e.clientY - lastY;
        rotY += dx * 0.5; rotX -= dy * 0.5; updateCardTransform();
        lastX = e.clientX; lastY = e.clientY;
    });
    window.addEventListener("mouseup", () => { isDragging = false; setTimeout(() => cardInteracting = false, 150); });
    window.addEventListener("wheel", (e) => {
        if (!document.getElementById('card-overlay').classList.contains('active')) return;
        scale += e.deltaY * -0.001; scale = Math.min(Math.max(0.5, scale), 2.5); updateCardTransform();
    });

    document.addEventListener('keydown', (e) => {
        if (document.getElementById('gb-overlay').classList.contains('active')) {
            if (e.key === "ArrowUp") gbAction('up'); if (e.key === "ArrowDown") gbAction('down');
            if (e.key === "ArrowLeft") gbAction('left'); if (e.key === "ArrowRight") gbAction('right');
            if (e.key === "a" || e.key === "Enter") gbAction('select'); if (e.key === "b" || e.key === "Backspace") gbAction('back');
        }
        if (e.key === "Escape") closeAll();
    });
</script>
</body>
</html>
